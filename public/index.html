<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABS Testmail</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e0e0e;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      padding: 48px 24px;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 48px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #cafd00;
      box-shadow: 0 0 10px #cafd00;
    }
    .brand {
      font-size: 11px; font-weight: 900; font-style: italic;
      letter-spacing: 0.22em; text-transform: uppercase;
    }

    .container { max-width: 680px; margin: 0 auto; }

    h1 {
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 900; font-style: italic;
      letter-spacing: -0.03em; line-height: 1;
      margin-bottom: 8px;
    }
    h1 span { color: #cafd00; }

    .subtitle {
      font-size: 13px; color: rgba(255,255,255,0.4);
      letter-spacing: 0.02em; margin-bottom: 32px;
    }

    .input-row {
      display: flex; gap: 12px; margin-bottom: 32px;
    }
    .input-wrap {
      flex: 1; position: relative;
    }
    input {
      width: 100%; height: 48px;
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.07);
      color: #fff; font-size: 14px;
      font-family: inherit; letter-spacing: 0.03em;
      padding: 0 16px;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: #cafd00;
      box-shadow: 0 0 0 1px #cafd00;
    }
    input::placeholder { color: rgba(255,255,255,0.25); }
    .suffix {
      position: absolute; right: 16px; top: 50%;
      transform: translateY(-50%);
      font-size: 12px; color: rgba(255,255,255,0.3);
      pointer-events: none;
    }

    button {
      height: 48px; padding: 0 24px;
      background: #cafd00; color: #0e0e0e;
      border: none; cursor: pointer;
      font-size: 11px; font-weight: 900; font-style: italic;
      letter-spacing: 0.2em; text-transform: uppercase;
      transition: background 0.15s, box-shadow 0.15s;
    }
    button:hover {
      background: #d8ff1a;
      box-shadow: 0 0 20px rgba(202,253,0,0.35);
    }

    .status {
      font-size: 10px; font-weight: 900; font-style: italic;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      margin-bottom: 16px;
    }
    .status .addr { color: #cafd00; }

    .empty {
      padding: 48px 0; text-align: center;
      font-size: 13px; color: rgba(255,255,255,0.2);
      font-style: italic; letter-spacing: 0.05em;
    }

    .message {
      border: 1px solid rgba(255,255,255,0.07);
      margin-bottom: 8px;
      transition: border-color 0.15s;
    }
    .message:hover { border-color: rgba(255,255,255,0.13); }

    .message-header {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 20px; cursor: pointer;
      background: #141414;
      user-select: none;
    }
    .message-header:hover { background: #1a1a1a; }

    .msg-from {
      font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.7);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      min-width: 0; flex: 0 0 200px;
    }
    .msg-subject {
      font-size: 13px; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex: 1; min-width: 0;
    }
    .msg-date {
      font-size: 10px; color: rgba(255,255,255,0.3);
      font-style: italic; letter-spacing: 0.05em;
      white-space: nowrap; flex-shrink: 0;
    }
    .chevron {
      font-size: 10px; color: rgba(255,255,255,0.25);
      flex-shrink: 0; transition: transform 0.2s;
    }
    .message.open .chevron { transform: rotate(180deg); }

    .message-body {
      display: none; padding: 24px 20px;
      background: #0e0e0e;
      border-top: 1px solid rgba(255,255,255,0.05);
      font-size: 13px; line-height: 1.7;
      color: rgba(255,255,255,0.75);
    }
    .message.open .message-body { display: block; }

    .msg-body-html { max-width: 100%; overflow-x: auto; }
    .msg-body-html a { color: #cafd00; }

    .refresh-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .countdown {
      font-size: 10px; font-style: italic;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: rgba(255,255,255,0.2);
    }
    .countdown .tick { color: rgba(202,253,0,0.5); }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <div class="dot"></div>
      <span class="brand">ABS Performance Lab — Testmail</span>
    </nav>

    <h1>DISPOSABLE<br><span>INBOX.</span></h1>
    <p class="subtitle">Emails expire after 1 hour. Enter a prefix to check an inbox.</p>

    <div class="input-row">
      <div class="input-wrap">
        <input id="prefix" type="text" placeholder="e.g. member1" autocomplete="off" />
        <span class="suffix">@mail.absperformancelab.ca</span>
      </div>
      <button onclick="loadInbox()">Check</button>
    </div>

    <div id="inbox-area" style="display:none">
      <div class="refresh-bar">
        <div class="status">Inbox: <span class="addr" id="current-addr"></span></div>
        <div class="countdown">Refreshing in <span class="tick" id="tick">5</span>s</div>
      </div>
      <div id="messages"></div>
    </div>
  </div>

  <script>
    let currentPrefix = '';
    let countdown = 5;
    let timer = null;

    document.getElementById('prefix').addEventListener('keydown', e => {
      if (e.key === 'Enter') loadInbox();
    });

    function loadInbox() {
      const val = document.getElementById('prefix').value.trim().toLowerCase();
      if (!val) return;
      currentPrefix = val;
      document.getElementById('current-addr').textContent = val + '@mail.absperformancelab.ca';
      document.getElementById('inbox-area').style.display = 'block';
      fetchMessages();
      startCountdown();
    }

    async function fetchMessages() {
      if (!currentPrefix) return;
      try {
        const res = await fetch(`/api/inbox/${encodeURIComponent(currentPrefix)}`);
        const msgs = await res.json();
        renderMessages(msgs);
      } catch (e) {
        console.error('fetch error', e);
      }
    }

    function renderMessages(msgs) {
      const el = document.getElementById('messages');
      if (!msgs.length) {
        el.innerHTML = '<div class="empty">No messages yet. Waiting for email…</div>';
        return;
      }
      // Preserve open state
      const open = new Set([...el.querySelectorAll('.message.open')].map(m => m.dataset.id));
      el.innerHTML = msgs.map(m => `
        <div class="message${open.has(m.MessageID) ? ' open' : ''}" data-id="${esc(m.MessageID)}">
          <div class="message-header" onclick="toggle(this.parentElement)">
            <div class="msg-from">${esc(m.From)}</div>
            <div class="msg-subject">${esc(m.Subject || '(no subject)')}</div>
            <div class="msg-date">${formatDate(m.Date)}</div>
            <div class="chevron">▼</div>
          </div>
          <div class="message-body">
            ${m.HtmlBody
              ? `<div class="msg-body-html">${m.HtmlBody}</div>`
              : `<pre style="white-space:pre-wrap">${esc(m.TextBody || '')}</pre>`}
          </div>
        </div>
      `).join('');
    }

    function toggle(el) { el.classList.toggle('open'); }

    function esc(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatDate(d) {
      if (!d) return '';
      try {
        return new Date(d).toLocaleString('en-CA', {
          month: 'short', day: 'numeric',
          hour: '2-digit', minute: '2-digit',
        });
      } catch { return d; }
    }

    function startCountdown() {
      if (timer) clearInterval(timer);
      countdown = 5;
      document.getElementById('tick').textContent = countdown;
      timer = setInterval(() => {
        countdown--;
        document.getElementById('tick').textContent = countdown;
        if (countdown <= 0) {
          countdown = 5;
          fetchMessages();
        }
      }, 1000);
    }
  </script>
</body>
</html>
